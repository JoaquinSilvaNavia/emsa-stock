<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>EMSA — Stock de Inventario</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0f14;--bg2:#13161e;--bg3:#1a1d27;--bdr:rgba(255,255,255,0.07);--bdr2:rgba(255,255,255,0.13);--text:#e8eaf0;--muted:#7a7f94;--acc:#7c3aed;--grn:#1d9e75;--red:#c94a4a;--amb:#d4890f;--font:'DM Sans',system-ui,sans-serif;--mono:'JetBrains Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;min-height:100vh}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--bdr);position:sticky;top:0;background:var(--bg);z-index:100}
.badge{background:var(--acc);color:#fff;font-size:11px;font-weight:600;padding:3px 8px;border-radius:4px;letter-spacing:.5px}
.htitle{font-size:15px;font-weight:500;margin-left:10px}
.hsub{font-size:11px;color:var(--muted);margin-left:10px;margin-top:1px}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--grn);animation:pulse 2s infinite;display:inline-block}
.nav-links{display:flex;gap:4px;align-items:center}
.nav-links a{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:500;text-decoration:none;border:1px solid rgba(255,255,255,.12);color:var(--muted)}
.nav-links a.on{color:#a78bfa;border-color:rgba(124,58,237,.5);background:rgba(124,58,237,.1)}
.tabs{display:flex;gap:2px;padding:0 20px;border-bottom:1px solid var(--bdr)}
.tab{padding:10px 18px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.tab:hover{color:var(--text)}.tab.on{color:var(--text);border-bottom-color:var(--acc)}
main{padding:18px 20px 48px;max-width:1060px}
.kpis{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:18px}
.kpi{background:var(--bg2);border:1px solid var(--bdr);border-radius:10px;padding:13px 15px}
.kpi-l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px}
.kpi-v{font-size:18px;font-weight:600;font-family:var(--mono);letter-spacing:-.5px}
.kpi-s{font-size:11px;color:var(--muted);margin-top:3px}
.card{background:var(--bg2);border:1px solid var(--bdr);border-radius:10px;padding:20px 22px;margin-bottom:14px}
.ch{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;flex-wrap:wrap;gap:10px}
.ct{font-size:14px;font-weight:500}.cs{font-size:11px;color:var(--muted);margin-top:2px}
.leg{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.li{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted);white-space:nowrap}
.ll{width:16px;height:2px;border-radius:1px;flex-shrink:0}
.cw{position:relative;width:100%;height:260px}
.cat-sel{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.cat-btn{padding:5px 14px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--bdr2);border-radius:20px;background:none;color:var(--muted);transition:all .15s}
.cat-btn:hover{color:var(--text)}.cat-btn.on{font-weight:600;border-width:2px}
.tbl{background:var(--bg2);border:1px solid var(--bdr);border-radius:10px;overflow:hidden;margin-bottom:14px}
.tbl table{width:100%;border-collapse:collapse;font-size:12px}
.tbl thead th{padding:9px 13px;text-align:right;font-size:10px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;background:var(--bg3);border-bottom:1px solid var(--bdr);white-space:nowrap}
.tbl thead th:first-child{text-align:left}
.tbl tbody td{padding:8px 13px;border-bottom:1px solid var(--bdr);text-align:right;font-family:var(--mono);font-size:11px;color:var(--text)}
.tbl tbody td:first-child{text-align:left;font-family:var(--font);font-size:12px}
.tbl tbody tr:last-child td{border-bottom:none}
.tbl tbody tr:hover td{background:rgba(255,255,255,.02)}
.cdot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px}
.sw{position:relative;margin-bottom:14px}
.sw input{width:100%;padding:10px 16px;background:var(--bg2);border:1px solid var(--bdr2);border-radius:8px;color:var(--text);font-family:var(--font);font-size:14px;outline:none}
.sw input:focus{border-color:var(--acc)}
.sw input::placeholder{color:var(--muted)}
#pac{position:absolute;top:100%;left:0;right:0;background:var(--bg2);border:1px solid var(--bdr2);border-radius:0 0 8px 8px;z-index:50;max-height:220px;overflow-y:auto;display:none}
.ac-item{padding:9px 16px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--bdr)}
.ac-item:hover{background:var(--bg3)}
.state-box{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;gap:12px;color:var(--muted);font-size:13px}
.spinner{width:26px;height:26px;border:2px solid var(--bdr2);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite}
.stat{background:var(--bg3);border-radius:8px;padding:10px 12px}
.stat-l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.stat-v{font-size:16px;font-weight:600;font-family:var(--mono)}
@media(max-width:600px){header,main,.tabs{padding-left:14px;padding-right:14px}.kpis{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<header>
  <div style="display:flex;align-items:center">
    <span class="badge">EMSA</span>
    <div><span class="htitle">Stock de Inventario</span><div class="hsub">Snapshot diario · todas las bodegas</div></div>
  </div>
  <div style="display:flex;gap:12px;align-items:center">
    <div class="nav-links">
      <a href="https://joaquinsilvanavia.github.io/emsa-proveedores/">CxP</a>
      <a href="https://joaquinsilvanavia.github.io/emsa-clientes/">CxC</a>
      <a href="https://joaquinsilvanavia.github.io/emsa-ventas/">Ventas</a>
      <a href="https://joaquinsilvanavia.github.io/emsa-stock/" class="on">Stock</a>
    </div>
    <div style="display:flex;align-items:center;gap:6px">
      <span class="sync-dot"></span>
      <span id="ls" style="font-size:11px;color:var(--muted)">Cargando...</span>
    </div>
  </div>
</header>
<div class="tabs">
  <button class="tab on" onclick="sT('r',this)">Resumen general</button>
  <button class="tab"    onclick="sT('b',this)">Por bodega</button>
  <button class="tab"    onclick="sT('p',this)">Búsqueda producto</button>
  <button class="tab"    onclick="sT('h',this)">Histórico</button>
</div>
<main id="mc"><div class="state-box"><div class="spinner"></div><span>Cargando datos...</span></div></main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
(function(){var K='emsa_auth',P='LuisSilvaEMSA';if(localStorage.getItem(K)===P)return;var ok=false;while(!ok){var i=prompt('EMSA — Ingresa la clave de acceso:');if(i===null){document.body.innerHTML='';return;}if(i===P){localStorage.setItem(K,P);ok=true;}else alert('Clave incorrecta.');}})();

const SID="1EmlOHAqIQzbcvDsqLcsCaFGYyJ0Pifmsjmv9j13z8Qo",AK="AIzaSyCXaM0fXC-6H-Pz22uRTv52uMe3xtIoLkU";
const CLS=[{k:'P.Terminados',c:'#3b8fd4'},{k:'Insumos',c:'#1d9e75'},{k:'Materias Primas',c:'#d4890f'},{k:'Envases',c:'#9b6dd4'},{k:'Repuestos',c:'#e05a5a'},{k:'Otros',c:'#7a7f94'}];

let rA=[],rH=[],aT='r',cA=null,cB=null,sCls='',sB='',vM='val'; // vM: 'val'=$ 'uni'=cantidad
const num=v=>{const n=parseFloat(String(v).replace(/[^0-9.-]/g,''));return isNaN(n)?0:n;};
const fmtM=v=>'$'+(v/1e6).toLocaleString('es-CL',{minimumFractionDigits:1,maximumFractionDigits:1})+'M';
const fmtN=v=>Math.round(v).toLocaleString('es-CL');
const kC=()=>{if(cA){cA.destroy();cA=null;}if(cB){cB.destroy();cB=null;}};
const clsColor=k=>CLS.find(c=>c.k===k)?.c||'#7a7f94';

function cOpts(u){return{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:'#1a1d27',borderColor:'rgba(255,255,255,.1)',borderWidth:1,titleColor:'#e8eaf0',bodyColor:'#7a7f94',padding:10,callbacks:{label:c=>' '+c.dataset.label+': '+c.parsed.y.toLocaleString('es-CL')+' '+u}}},scales:{x:{grid:{display:false},ticks:{color:'#7a7f94',font:{size:11}},border:{color:'rgba(255,255,255,.07)'}},y:{grid:{color:'rgba(255,255,255,.05)'},border:{display:false},ticks:{color:'#7a7f94',font:{size:11},callback:v=>v.toLocaleString('es-CL')}}}};}

async function fS(tab){
  const r=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SID}/values/${tab}!A:M?key=${AK}`);
  if(!r.ok) throw new Error('HTTP '+r.status);
  const d=await r.json(),rows=d.values||[];
  if(rows.length<2) return [];
  const h=rows[0];
  return rows.slice(1).map(row=>{const o={};h.forEach((k,i)=>o[k]=row[i]??'');return o;});
}

function sT(t,btn){aT=t;document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));btn.classList.add('on');rT();}
function rT(){if(aT==='r')rR();else if(aT==='b')rB();else if(aT==='p')rP();else rHist();}

function rR(){
  const d=rA;
  if(!d.length){document.getElementById('mc').innerHTML='<div class="state-box"><span>Sin datos. Ejecutar emsa_sync_stock.py --once</span></div>';return;}
  if(!sCls) sCls=CLS.find(c=>d.some(r=>r.CLASIFICACION===c.k))?.k||'';

  const totV=d.reduce((s,r)=>s+num(r['Valorizado_FI']),0);
  const totU=d.filter(r=>num(r['Stock Actual'])>0).length;
  const sinS=d.filter(r=>num(r['Stock Actual'])<=0).length;
  const nBod=new Set(d.map(r=>r['Nombre Bodega'])).size;

  // Resumen por clasificación
  const bCls={};CLS.forEach(c=>bCls[c.k]={val:0,unid:0,prods:0});
  d.forEach(r=>{const cl=r.CLASIFICACION||'Otros';if(!bCls[cl])bCls[cl]={val:0,unid:0,prods:0};bCls[cl].val+=num(r['Valorizado_FI']);bCls[cl].unid+=num(r['Stock Actual']);bCls[cl].prods++;});
  const cf=CLS.filter(c=>bCls[c.k]?.prods>0);

  // Botones clasificación
  const clsBtns=cf.map(c=>`<button class="cat-btn${c.k===sCls?' on':''}"
    style="${c.k===sCls?'color:'+c.c+';border-color:'+c.c+';border-width:2px':''}"
    onclick="sCls='${c.k}';sB='';rR()">${c.k}</button>`).join('');

  // Toggle $  / cantidad
  const toggleHTML=`<div style="display:flex;gap:4px;align-items:center">
    <button class="cat-btn${vM==='val'?' on':''}" style="font-size:11px;padding:3px 10px;${vM==='val'?'color:'+clsColor(sCls)+';border-color:'+clsColor(sCls)+';border-width:2px':''}" onclick="vM='val';rR()">$</button>
    <button class="cat-btn${vM==='uni'?' on':''}" style="font-size:11px;padding:3px 10px;${vM==='uni'?'color:'+clsColor(sCls)+';border-color:'+clsColor(sCls)+';border-width:2px':''}" onclick="vM='uni';rR()">Cant.</button>
  </div>`;

  // Detalle: productos de la clasificación activa, agrupados por bodega
  const filt=d.filter(r=>r.CLASIFICACION===sCls);
  const bodegas=[...new Set(filt.map(r=>r['Nombre Bodega']))].sort();
  if(!sB && bodegas.length) sB=bodegas[0];

  const bodBtns=bodegas.map(b=>`<button class="cat-btn${b===sB?' on':''}"
    style="font-size:11px;padding:3px 10px;${b===sB?'color:'+clsColor(sCls)+';border-color:'+clsColor(sCls)+';border-width:2px':''}"
    onclick="sB='${b.replace(/'/g,"\'")}';rR()">${b.length>22?b.slice(0,20)+'…':b}</button>`).join('');

  const prodsBod=filt.filter(r=>r['Nombre Bodega']===sB)
    .sort((a,b)=>vM==='val'?num(b['Valorizado_FI'])-num(a['Valorizado_FI']):num(b['Stock Actual'])-num(a['Stock Actual']));

  const totBodV=prodsBod.reduce((s,r)=>s+num(r['Valorizado_FI']),0);
  const totBodU=prodsBod.reduce((s,r)=>s+num(r['Stock Actual']),0);

  const detRows=prodsBod.map(r=>{
    const cero=num(r['Stock Actual'])<=0;
    return `<tr>
      <td style="font-size:11px;color:var(--muted)">${r['Cod.Producto']}</td>
      <td>${r['Nombre Producto']}${cero?' <span style="font-size:10px;padding:1px 5px;border-radius:3px;background:rgba(201,74,74,.15);color:var(--red)">SIN STOCK</span>':''}</td>
      <td style="color:var(--muted);font-size:11px">${r['Nivel 2']||'—'}</td>
      <td class="${cero?'red':''}">${fmtN(num(r['Stock Actual']))} ${r['Uni.Med.']}</td>
      <td>${fmtM(num(r['Valorizado_FI']))}</td>
    </tr>`;
  }).join('');

  // Tabla resumen por clasificación
  const tR=cf.map(c=>{const dd=bCls[c.k];const pct=(dd.val/totV*100).toFixed(1);
    return`<tr style="cursor:pointer" onclick="sCls='${c.k}';sB='';rR()">
      <td><span class="cdot" style="background:${c.c}"></span>${c.k}</td>
      <td>${dd.prods.toLocaleString('es-CL')}</td>
      <td>${vM==='uni'?'<b>'+fmtN(dd.unid)+'</b>':fmtN(dd.unid)}</td>
      <td>${vM==='val'?'<b>'+fmtM(dd.val)+'</b>':fmtM(dd.val)}</td>
      <td style="color:var(--muted)">${pct}%</td>
    </tr>`;}).join('');

  kC();
  // KPIs agrupados: PT, Insumos+MP juntos
  const vPT  = bCls['P.Terminados']?.val||0;
  const uPT  = bCls['P.Terminados']?.unid||0;
  const vIns = (bCls['Insumos']?.val||0)+(bCls['Materias Primas']?.val||0);
  const uIns = (bCls['Insumos']?.unid||0)+(bCls['Materias Primas']?.unid||0);
  // Toggle $ / unidades en header
  const toggleKPI=`<div style="display:flex;gap:4px">
    <button class="cat-btn${vM==='val'?' on':''}" style="font-size:11px;padding:3px 10px;${vM==='val'?'color:var(--pur);border-color:var(--pur);border-width:2px':''}" onclick="vM='val';rR()">$</button>
    <button class="cat-btn${vM==='uni'?' on':''}" style="font-size:11px;padding:3px 10px;${vM==='uni'?'color:var(--pur);border-color:var(--pur);border-width:2px':''}" onclick="vM='uni';rR()">Cant.</button>
  </div>`;

  document.getElementById('mc').innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:2px;margin-bottom:12px">
      <span style="font-size:12px;color:var(--muted)">Snapshot: ${d[0]?.FECHA||'—'}</span>
      ${toggleKPI}
    </div>
    <div class="kpis" style="margin-top:0">
      <div class="kpi">
        <div class="kpi-l">Inventario total</div>
        <div class="kpi-v">${vM==='val'?fmtM(totV):fmtN(d.reduce((s,r)=>s+num(r['Stock Actual']),0))}</div>
        <div class="kpi-s">${nBod} bodegas · ${new Set(d.map(r=>r['Cod.Producto'])).size} productos</div>
      </div>
      <div class="kpi" style="border-left:3px solid var(--c-pt)">
        <div class="kpi-l"><span class="cdot" style="background:var(--c-pt)"></span>Prod. Terminados</div>
        <div class="kpi-v" style="color:var(--c-pt)">${vM==='val'?fmtM(vPT):fmtN(uPT)}</div>
        <div class="kpi-s">${bCls['P.Terminados']?.prods||0} productos</div>
      </div>
      <div class="kpi" style="border-left:3px solid var(--c-ins)">
        <div class="kpi-l"><span class="cdot" style="background:var(--c-ins)"></span>Insumos + Mat. Primas</div>
        <div class="kpi-v" style="color:var(--c-ins)">${vM==='val'?fmtM(vIns):fmtN(uIns)}</div>
        <div class="kpi-s">${(bCls['Insumos']?.prods||0)+(bCls['Materias Primas']?.prods||0)} productos</div>
      </div>
      <div class="kpi">
        <div class="kpi-l">Sin stock</div>
        <div class="kpi-v" style="color:var(--red)">${sinS.toLocaleString('es-CL')}</div>
        <div class="kpi-s">items en cero o negativo</div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1.8fr;gap:14px;margin-bottom:14px">
      <div class="card" style="margin-bottom:0">
        <div class="ch"><div><div class="ct">Distribución por valor</div><div class="cs">% del inventario total</div></div></div>
        <div class="cw" style="height:220px"><canvas id="cD"></canvas></div>
      </div>
      <div class="tbl" style="margin-bottom:0"><table>
        <thead><tr><th>Clasificación</th><th>Productos</th><th>Unidades</th><th>Valorizado</th><th>%</th></tr></thead>
        <tbody>${tR}</tbody>
      </table></div>
    </div>
    <div class="card">
      <div class="ch">
        <div><div class="ct">Detalle productos · ${sCls}</div><div class="cs">${prodsBod.length} productos · ${sB}</div></div>
        ${toggleHTML}
      </div>
      <div class="cat-sel" style="margin-bottom:10px">${clsBtns}</div>
      <div class="cat-sel" style="margin-bottom:14px">${bodBtns}</div>
      <div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px">
        <thead style="background:var(--bg3)"><tr>
          <th style="padding:8px 12px;text-align:left;font-size:10px;color:var(--muted);text-transform:uppercase">Código</th>
          <th style="padding:8px 12px;text-align:left;font-size:10px;color:var(--muted);text-transform:uppercase">Producto</th>
          <th style="padding:8px 12px;text-align:left;font-size:10px;color:var(--muted);text-transform:uppercase">Subcategoría</th>
          <th style="padding:8px 12px;text-align:right;font-size:10px;color:var(--muted);text-transform:uppercase">${vM==='uni'?'<b>Cantidad</b>':'Cantidad'}</th>
          <th style="padding:8px 12px;text-align:right;font-size:10px;color:var(--muted);text-transform:uppercase">${vM==='val'?'<b>Valorizado</b>':'Valorizado'}</th>
        </tr></thead>
        <tbody style="font-family:var(--mono);font-size:11px">${detRows}</tbody>
        <tfoot><tr style="background:var(--bg3)">
          <td colspan="3" style="padding:8px 12px;font-size:11px;font-weight:600;text-align:left;font-family:var(--font)">TOTAL ${sB}</td>
          <td style="padding:8px 12px;text-align:right;font-weight:600">${fmtN(totBodU)}</td>
          <td style="padding:8px 12px;text-align:right;font-weight:600">${fmtM(totBodV)}</td>
        </tr></tfoot>
      </table></div>
    </div>`;

  setTimeout(()=>{const ctx=document.getElementById('cD');if(!ctx)return;
    cA=new Chart(ctx,{type:'doughnut',data:{labels:cf.map(c=>c.k),datasets:[{data:cf.map(c=>Math.round(bCls[c.k].val/1e6*10)/10),backgroundColor:cf.map(c=>c.c),borderWidth:2,borderColor:'#13161e'}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{display:false},
    tooltip:{backgroundColor:'#1a1d27',borderColor:'rgba(255,255,255,.1)',borderWidth:1,titleColor:'#e8eaf0',bodyColor:'#7a7f94',padding:10,
    callbacks:{label:c=>' '+c.label+': M$'+c.parsed.toLocaleString('es-CL')}}}}});
  },80);
}

function rB(){
  const d=rA;if(!sCls)sCls=CLS[0].k;
  const clsBtns=CLS.filter(c=>d.some(r=>r.CLASIFICACION===c.k)).map(c=>`<button class="cat-btn${c.k===sCls?' on':''}" style="${c.k===sCls?'color:'+c.c+';border-color:'+c.c+';border-width:2px':''}" onclick="sCls='${c.k}';rB()">${c.k}</button>`).join('');
  const f=d.filter(r=>r.CLASIFICACION===sCls);
  const bB={};f.forEach(r=>{const b=r['Nombre Bodega'];if(!bB[b])bB[b]={val:0,unid:0,prods:0};bB[b].val+=num(r['Valorizado_FI']);bB[b].unid+=num(r['Stock Actual']);bB[b].prods++;});
  const s=Object.entries(bB).sort((a,b)=>b[1].val-a[1].val);
  const ac=clsColor(sCls);
  kC();
  document.getElementById('mc').innerHTML=`
    <div class="cat-sel" style="margin-top:2px">${clsBtns}</div>
    <div class="card"><div class="ch"><div><div class="ct">Stock por bodega · ${sCls}</div><div class="cs">Valor M$ ordenado descendente</div></div></div><div class="cw" style="height:${Math.max(220,s.length*42+80)}px"><canvas id="cB2"></canvas></div></div>
    <div class="tbl"><table><thead><tr><th>Bodega</th><th>Productos</th><th>Unidades</th><th>Valorizado</th></tr></thead><tbody>${s.map(([b,dd])=>`<tr><td>${b}</td><td>${dd.prods.toLocaleString('es-CL')}</td><td>${fmtN(dd.unid)}</td><td>${fmtM(dd.val)}</td></tr>`).join('')}</tbody></table></div>`;
  setTimeout(()=>{const ctx=document.getElementById('cB2');if(!ctx)return;
    cA=new Chart(ctx,{type:'bar',data:{labels:s.map(([b])=>b),datasets:[{label:'Valorizado M$',data:s.map(([,dd])=>Math.round(dd.val/1e6*10)/10),backgroundColor:ac+'cc',borderRadius:4,barPercentage:.6}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:'#1a1d27',borderColor:'rgba(255,255,255,.1)',borderWidth:1,titleColor:'#e8eaf0',bodyColor:'#7a7f94',padding:10,callbacks:{label:c=>' M$'+c.parsed.x.toLocaleString('es-CL')}}},
    scales:{x:{grid:{color:'rgba(255,255,255,.05)'},border:{display:false},ticks:{color:'#7a7f94',font:{size:11},callback:v=>'M$'+v}},y:{grid:{display:false},ticks:{color:'#7a7f94',font:{size:11}},border:{color:'rgba(255,255,255,.07)'}}}}});
  },80);
}

function rP(){
  document.getElementById('mc').innerHTML=`
    <div class="sw" style="margin-top:2px"><input id="ip" placeholder="Buscar producto por nombre o código..." autocomplete="off" oninput="oPI(this.value)"/><div id="pac"></div></div>
    <div id="pa"><div class="state-box"><span>Busca un producto para ver su detalle por bodega</span></div></div>`;
}
function oPI(v){const ac=document.getElementById('pac');if(v.length<2){ac.style.display='none';return;}
  const q=v.toLowerCase(),m=[...new Map(rA.filter(r=>r['Nombre Producto'].toLowerCase().includes(q)||r['Cod.Producto'].includes(q)).map(r=>[r['Cod.Producto'],r])).values()].slice(0,8);
  if(!m.length){ac.style.display='none';return;}
  ac.innerHTML=m.map(r=>`<div class="ac-item" onclick="sP('${r['Cod.Producto'].replace(/'/g,"\\'")}')"><b>${r['Nombre Producto']}</b> <span style="color:var(--muted);font-size:11px">${r['Cod.Producto']} · ${r.CLASIFICACION}</span></div>`).join('');
  ac.style.display='block';
}
function sP(cod){
  document.getElementById('pac').style.display='none';
  const rows=rA.filter(r=>r['Cod.Producto']===cod);if(!rows.length)return;
  const nm=rows[0]['Nombre Producto'];document.getElementById('ip').value=nm;
  const totV=rows.reduce((s,r)=>s+num(r['Valorizado_FI']),0);
  const totU=rows.reduce((s,r)=>s+num(r['Stock Actual']),0);
  const cls=rows[0].CLASIFICACION,cc=clsColor(cls);
  const tR=rows.sort((a,b)=>num(b['Valorizado_FI'])-num(a['Valorizado_FI'])).map(r=>`<tr><td>${r['Nombre Bodega']}</td><td>${fmtN(num(r['Stock Actual']))} ${r['Uni.Med.']}</td><td>${fmtM(num(r['Valorizado_FI']))}</td><td style="color:var(--muted);font-size:11px">${r['Nivel 2']}</td></tr>`).join('');
  document.getElementById('pa').innerHTML=`
    <div class="card"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;flex-wrap:wrap;gap:8px">
      <div><div style="font-size:15px;font-weight:600">${nm}</div><div style="font-size:12px;color:var(--muted);margin-top:2px">${cod} · <span style="color:${cc}">${cls}</span></div></div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:0">
      <div class="stat"><div class="stat-l">Unidades totales</div><div class="stat-v">${fmtN(totU)} ${rows[0]['Uni.Med.']}</div></div>
      <div class="stat"><div class="stat-l">Valor total</div><div class="stat-v">${fmtM(totV)}</div></div>
      <div class="stat"><div class="stat-l">Bodegas</div><div class="stat-v">${rows.length}</div></div>
    </div></div>
    <div class="tbl"><table><thead><tr><th>Bodega</th><th>Stock</th><th>Valorizado</th><th>Sub-categoría</th></tr></thead><tbody>${tR}</tbody></table></div>`;
}

function rHist(){
  if(!rH.length){document.getElementById('mc').innerHTML='<div class="state-box"><span>Sin datos históricos aún.</span><span style="font-size:12px">El histórico se acumula con cada sync diario.</span></div>';return;}
  if(!sCls)sCls=CLS[0].k;
  const fechas=[...new Set(rH.map(r=>r.FECHA))].sort();
  const bF={};rH.forEach(r=>{if(!bF[r.FECHA])bF[r.FECHA]={};const cl=r.CLASIFICACION||'Otros';if(!bF[r.FECHA][cl])bF[r.FECHA][cl]={val:0};bF[r.FECHA][cl].val+=num(r['Valorizado_FI']);});
  const clsBtns=CLS.filter(c=>rH.some(r=>r.CLASIFICACION===c.k)).map(c=>`<button class="cat-btn${c.k===sCls?' on':''}" style="${c.k===sCls?'color:'+c.c+';border-color:'+c.c+';border-width:2px':''}" onclick="sCls='${c.k}';rHist()">${c.k}</button>`).join('');
  const ac=clsColor(sCls);
  kC();
  document.getElementById('mc').innerHTML=`
    <div class="cat-sel" style="margin-top:2px">${clsBtns}</div>
    <div class="card"><div class="ch"><div><div class="ct">Evolución histórica · ${sCls}</div><div class="cs">Valor M$ por fecha de snapshot · ${fechas.length} registros</div></div><div class="leg"><span class="li"><span class="ll" style="background:${ac}"></span>${sCls}</span></div></div><div class="cw" style="height:260px"><canvas id="cH"></canvas></div></div>
    <div class="tbl"><table><thead><tr><th>Fecha</th><th>Valor M$</th></tr></thead><tbody>${fechas.map(f=>`<tr><td>${f}</td><td>${fmtM(bF[f]?.[sCls]?.val||0)}</td></tr>`).join('')}</tbody></table></div>`;
  setTimeout(()=>{const ctx=document.getElementById('cH');if(!ctx)return;
    cA=new Chart(ctx,{type:'line',data:{labels:fechas,datasets:[{label:sCls,data:fechas.map(f=>Math.round((bF[f]?.[sCls]?.val||0)/1e6*10)/10),borderColor:ac,backgroundColor:ac+'15',borderWidth:2.5,pointRadius:4,pointHoverRadius:7,pointBackgroundColor:ac,tension:.35,fill:true}]},options:cOpts('M$')});
  },80);
}

(async()=>{
  try{
    [rA,rH]=await Promise.all([fS('stock_actual'),fS('stock_historico')]);
    try{const r=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SID}/values/meta!A1?key=${AK}`);const d=await r.json();const v=d.values?.[0]?.[0];document.getElementById('ls').textContent=v?'Sync: '+v:'Sin datos';}catch(e){document.getElementById('ls').textContent='Sin datos';}
    if(!rA.length){document.getElementById('mc').innerHTML='<div class="state-box"><span>Sheet vacío.</span><span style="font-size:12px">Ejecutar: py emsa_sync_stock.py --once</span></div>';return;}
    rR();
  }catch(e){document.getElementById('mc').innerHTML=`<div class="state-box"><span style="color:var(--red)">Error al cargar datos</span><span style="font-size:12px">${e.message}</span></div>`;}
})();
</script>
</body>
</html>

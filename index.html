<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>EMSA — Stock de Inventario</title>
<!--
  EMSA — Dashboard Stock de Inventario
  Vista SQL: INFORMAT_Vista_Stock_Actual_por_Bodegas_EMSA
  Sheet: 1EmlOHAqIQzbcvDsqLcsCaFGYyJ0Pifmsjmv9j13z8Qo
  Pestañas: stock_actual, stock_historico, meta
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0f14;--bg2:#13161e;--bg3:#1a1d27;
  --bdr:rgba(255,255,255,0.07);--bdr2:rgba(255,255,255,0.13);
  --text:#e8eaf0;--muted:#7a7f94;
  --acc:#2e74b5;--grn:#1d9e75;--red:#c94a4a;--amb:#d4890f;--pur:#9b6dd4;
  --font:'DM Sans',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;

  /* colores por clasificación */
  --c-pt:  #3b8fd4;
  --c-ins: #d4890f;
  --c-mp:  #1d9e75;
  --c-env: #9b6dd4;
  --c-sin: #7a7f94;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;min-height:100vh}

header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--bdr);position:sticky;top:0;background:var(--bg);z-index:100}
.badge{background:var(--pur);color:#fff;font-size:11px;font-weight:600;padding:3px 8px;border-radius:4px;letter-spacing:.5px}
.htitle{font-size:15px;font-weight:500;margin-left:10px}
.hsub{font-size:11px;color:var(--muted);margin-left:10px;margin-top:1px}
.sync-row{display:flex;align-items:center;gap:12px}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--grn);animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
#last-sync{font-size:11px;color:var(--muted)}
.nav-links{display:flex;gap:4px;align-items:center}
.nav-a{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:500;text-decoration:none;border:1px solid rgba(255,255,255,.12);color:var(--muted)}

.tabs{display:flex;gap:2px;padding:0 20px;border-bottom:1px solid var(--bdr)}
.tab{padding:10px 18px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.tab:hover{color:var(--text)}.tab.on{color:var(--text);border-bottom-color:var(--pur)}

main{padding:18px 20px 48px;max-width:1060px}

/* KPIs */
.kpis{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:20px}
.kpi{background:var(--bg2);border:1px solid var(--bdr);border-radius:10px;padding:13px 15px}
.kpi-l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px}
.kpi-v{font-size:18px;font-weight:600;font-family:var(--mono);letter-spacing:-.5px}
.kpi-s{font-size:11px;color:var(--muted);margin-top:3px}

/* Cards */
.card{background:var(--bg2);border:1px solid var(--bdr);border-radius:10px;padding:20px 22px;margin-bottom:14px}
.ch{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;flex-wrap:wrap;gap:10px}
.ct{font-size:14px;font-weight:500}.cs{font-size:11px;color:var(--muted);margin-top:2px}
.leg{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.li{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted)}
.ll{width:16px;height:2px;border-radius:1px}
.cw{position:relative;width:100%;height:260px}

/* Clasificación pills */
.cat-sel{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.cat-btn{padding:5px 14px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--bdr2);border-radius:20px;background:none;color:var(--muted);transition:all .15s}
.cat-btn:hover{color:var(--text)}

/* Tabla */
.tbl{background:var(--bg2);border:1px solid var(--bdr);border-radius:10px;overflow:hidden}
.tbl table{width:100%;border-collapse:collapse;font-size:12px}
.tbl thead th{padding:9px 13px;text-align:right;font-size:10px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;background:var(--bg3);border-bottom:1px solid var(--bdr);white-space:nowrap}
.tbl thead th:first-child{text-align:left}
.tbl tbody td{padding:8px 13px;border-bottom:1px solid var(--bdr);text-align:right;font-family:var(--mono);font-size:11px}
.tbl tbody td:first-child{text-align:left;font-family:var(--font);font-size:12px}
.tbl tbody tr:last-child td{border-bottom:none}
.tbl tbody tr:hover td{background:rgba(255,255,255,.02)}
.cdot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px}

/* Búsqueda */
.search-wrap{position:relative;margin-bottom:14px}
.search-wrap input{width:100%;padding:10px 16px;background:var(--bg2);border:1px solid var(--bdr2);border-radius:8px;color:var(--text);font-family:var(--font);font-size:14px;outline:none}
.search-wrap input:focus{border-color:var(--pur)}
.search-wrap input::placeholder{color:var(--muted)}
#ac-stock{position:absolute;top:100%;left:0;right:0;background:var(--bg2);border:1px solid var(--bdr2);border-radius:0 0 8px 8px;z-index:50;max-height:220px;overflow-y:auto;display:none}
.ac-item{padding:9px 16px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--bdr)}
.ac-item:hover{background:var(--bg3)}

/* Estado */
.state-box{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:360px;gap:12px;color:var(--muted);font-size:13px}
.spinner{width:26px;height:26px;border:2px solid var(--bdr2);border-top-color:var(--pur);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.tag-cero{background:rgba(201,74,74,.12);color:var(--red);border-radius:4px;padding:2px 6px;font-size:10px;font-family:var(--font)}

@media(max-width:600px){
  header,main,.tabs{padding-left:14px;padding-right:14px}
  .kpis{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center">
    <span class="badge">EMSA</span>
    <div><span class="htitle">Stock de Inventario</span><div class="hsub">Productos Terminados · Insumos · Materias Primas</div></div>
  </div>
  <div class="sync-row">
    <div class="nav-links">
      <a href="https://joaquinsilvanavia.github.io/emsa-proveedores/" class="nav-a">CxP</a>
      <a href="https://joaquinsilvanavia.github.io/emsa-clientes/"    class="nav-a">CxC</a>
      <a href="https://joaquinsilvanavia.github.io/emsa-ventas/"     class="nav-a">Ventas</a>
      <a href="https://joaquinsilvanavia.github.io/emsa-stock/"      class="nav-a" style="color:var(--pur);border-color:rgba(155,109,212,.5);background:rgba(155,109,212,.1)">Stock</a>
    </div>
    <div style="display:flex;align-items:center;gap:5px"><span class="sync-dot"></span><span id="last-sync">Cargando...</span></div>
  </div>
</header>

<div class="tabs">
  <button class="tab on" onclick="showTab('actual',this)">Stock actual</button>
  <button class="tab"    onclick="showTab('bodega',this)">Por bodega</button>
  <button class="tab"    onclick="showTab('productos',this)">Búsqueda productos</button>
  <button class="tab"    onclick="showTab('historico',this)">Evolución histórica</button>
</div>

<main id="mc">
  <div class="state-box"><div class="spinner"></div><span>Cargando datos...</span></div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
// ── AUTH ──────────────────────────────────────────────────────
(function(){
  var KEY='emsa_auth',PWD='LuisSilvaEMSA';
  if(localStorage.getItem(KEY)===PWD)return;
  var ok=false;
  while(!ok){
    var input=prompt('EMSA — Ingresa la clave de acceso:');
    if(input===null){document.body.innerHTML='';return;}
    if(input===PWD){localStorage.setItem(KEY,PWD);ok=true;}
    else alert('Clave incorrecta. Intenta nuevamente.');
  }
})();

// ── CONFIGURACIÓN ─────────────────────────────────────────────
const SHEET_ID = "1EmlOHAqIQzbcvDsqLcsCaFGYyJ0Pifmsjmv9j13z8Qo";
const API_KEY  = "AIzaSyCXaM0fXC-6H-Pz22uRTv52uMe3xtIoLkU";

// ── COLORES POR CLASIFICACIÓN ─────────────────────────────────
const CLAS_COLOR = {
  'P.Terminados':  '#3b8fd4',
  'Insumos':       '#d4890f',
  'Materias Primas':'#1d9e75',
  'Envases':       '#9b6dd4',
  'Sin clasificar':'#7a7f94',
};
function clasColor(c){ return CLAS_COLOR[c] || '#7a7f94'; }

// ── ESTADO ────────────────────────────────────────────────────
let rawActual=[], rawHist=[], activeTab='actual', chartInst=null;
let selClas='', selBodega='';

// ── UTILS ─────────────────────────────────────────────────────
const num  = v => { const n=parseFloat(String(v||0).replace(/[^0-9.-]/g,'')); return isNaN(n)?0:n; };
const fmtM = v => '$'+(v/1e6).toLocaleString('es-CL',{minimumFractionDigits:1,maximumFractionDigits:1})+'M';
const fmtN = v => Math.round(v).toLocaleString('es-CL');
const killChart = () => { if(chartInst){chartInst.destroy();chartInst=null;} };

function cOpts(unit){
  return{responsive:true,maintainAspectRatio:false,
    interaction:{mode:'index',intersect:false},
    plugins:{legend:{display:false},tooltip:{backgroundColor:'#1a1d27',borderColor:'rgba(255,255,255,.1)',borderWidth:1,titleColor:'#e8eaf0',bodyColor:'#7a7f94',padding:10,
      callbacks:{label:ctx=>` ${ctx.dataset.label}: ${ctx.parsed.y.toLocaleString('es-CL')} ${unit}`}}},
    scales:{
      x:{grid:{display:false},ticks:{color:'#7a7f94',font:{size:11}},border:{color:'rgba(255,255,255,.07)'}},
      y:{grid:{color:'rgba(255,255,255,.05)'},border:{display:false},ticks:{color:'#7a7f94',font:{size:11},callback:v=>v.toLocaleString('es-CL')}}
    }};
}

// ── FETCH ─────────────────────────────────────────────────────
async function fetchSheet(tab){
  const url=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${tab}!A:P?key=${API_KEY}`;
  const r=await fetch(url);
  if(!r.ok) throw new Error('HTTP '+r.status+' — '+tab);
  const d=await r.json();
  const rows=d.values||[];
  if(rows.length<2) return [];
  const h=rows[0];
  return rows.slice(1).map(row=>{const o={};h.forEach((k,i)=>o[k]=row[i]??'');return o;});
}

// ── TAB SWITCH ────────────────────────────────────────────────
function showTab(t,btn){
  activeTab=t;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  render();
}
function render(){
  killChart();
  if(activeTab==='actual')    renderActual();
  else if(activeTab==='bodega')    renderBodega();
  else if(activeTab==='productos') renderProductos();
  else renderHistorico();
}

// ── TAB: STOCK ACTUAL ─────────────────────────────────────────
function renderActual(){
  const clases=[...new Set(rawActual.map(r=>r.CLASIFICACION))].sort();
  if(!selClas && clases.length) selClas=clases[0];

  const totVal  = rawActual.reduce((s,r)=>s+num(r.Valorizado_FI),0);
  const totUnid = rawActual.reduce((s,r)=>s+num(r['Stock Actual']),0);
  const nProd   = new Set(rawActual.map(r=>r['Cod.Producto'])).size;
  const nBod    = new Set(rawActual.map(r=>r['Cod.Bodega'])).size;

  // Resumen por clasificación
  const byClass={};
  rawActual.forEach(r=>{
    const c=r.CLASIFICACION;
    if(!byClass[c]) byClass[c]={val:0,uni:0,prods:new Set()};
    byClass[c].val+=num(r.Valorizado_FI);
    byClass[c].uni+=num(r['Stock Actual']);
    byClass[c].prods.add(r['Cod.Producto']);
  });

  // Detalle filtrado por clasificación
  const filtered = rawActual.filter(r=>r.CLASIFICACION===selClas);
  const byNiv2={};
  filtered.forEach(r=>{
    const k=r['Nivel 2']||'Sin subclasificación';
    if(!byNiv2[k]) byNiv2[k]={val:0,uni:0};
    byNiv2[k].val+=num(r.Valorizado_FI);
    byNiv2[k].uni+=num(r['Stock Actual']);
  });
  const niv2List=Object.entries(byNiv2).sort((a,b)=>b[1].val-a[1].val);

  const catBtns=clases.map(c=>
    `<button class="cat-btn${c===selClas?' on':''}"
      style="${c===selClas?'color:'+clasColor(c)+';border-color:'+clasColor(c)+';border-width:2px':''}"
      onclick="selClas='${c}';renderActual()">${c}</button>`
  ).join('');

  const legH=clases.map(c=>`<span class="li"><span class="ll" style="background:${clasColor(c)}"></span>${c}</span>`).join('');

  // Gráfico dona por valor
  const pieLabels=Object.keys(byClass);
  const pieData  =pieLabels.map(c=>Math.round(byClass[c].val/1e6*10)/10);
  const pieColors=pieLabels.map(c=>clasColor(c));

  // Tabla detalle Nivel 2
  const rows=niv2List.map(([k,v])=>`<tr>
    <td>${k}</td>
    <td>${fmtN(v.uni)}</td>
    <td>${fmtM(v.val)}</td>
    <td>${totVal>0?(v.val/totVal*100).toFixed(1)+'%':'—'}</td>
  </tr>`).join('');

  document.getElementById('mc').innerHTML=`
    <div class="kpis" style="margin-top:4px">
      <div class="kpi"><div class="kpi-l">Valor total stock</div><div class="kpi-v">${fmtM(totVal)}</div><div class="kpi-s">${nProd} productos</div></div>
      <div class="kpi"><div class="kpi-l">Unidades totales</div><div class="kpi-v">${fmtN(totUnid)}</div><div class="kpi-s">${nBod} bodegas</div></div>
      ${clases.slice(0,2).map(c=>`
      <div class="kpi">
        <div class="kpi-l"><span class="cdot" style="background:${clasColor(c)}"></span>${c}</div>
        <div class="kpi-v">${fmtM(byClass[c]?.val||0)}</div>
        <div class="kpi-s">${fmtN(byClass[c]?.uni||0)} unidades</div>
      </div>`).join('')}
    </div>

    <div style="display:grid;grid-template-columns:1fr 1.6fr;gap:14px;margin-bottom:14px">
      <div class="card" style="margin-bottom:0">
        <div class="ch"><div><div class="ct">Distribución por clasificación</div><div class="cs">% del valor total</div></div></div>
        <div class="cw" style="height:220px"><canvas id="cPie"></canvas></div>
      </div>
      <div class="card" style="margin-bottom:0">
        <div class="ch">
          <div><div class="ct">Detalle por subclasificación</div><div class="cs">${selClas} · Nivel 2</div></div>
        </div>
        <div class="cat-sel">${catBtns}</div>
        <div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px">
          <thead style="background:var(--bg3)"><tr>
            <th style="padding:8px 12px;text-align:left;font-size:10px;color:var(--muted);text-transform:uppercase">Subclasificación</th>
            <th style="padding:8px 12px;text-align:right;font-size:10px;color:var(--muted);text-transform:uppercase">Unidades</th>
            <th style="padding:8px 12px;text-align:right;font-size:10px;color:var(--muted);text-transform:uppercase">Valorizado</th>
            <th style="padding:8px 12px;text-align:right;font-size:10px;color:var(--muted);text-transform:uppercase">% Total</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table></div>
      </div>
    </div>`;

  // Gráfico dona
  killChart();
  chartInst=new Chart(document.getElementById('cPie'),{
    type:'doughnut',
    data:{labels:pieLabels,datasets:[{data:pieData,backgroundColor:pieColors,borderWidth:2,borderColor:'#13161e'}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'65%',
      plugins:{legend:{display:false},tooltip:{backgroundColor:'#1a1d27',borderColor:'rgba(255,255,255,.1)',borderWidth:1,titleColor:'#e8eaf0',bodyColor:'#7a7f94',padding:10,
        callbacks:{label:ctx=>' '+ctx.label+': M$'+ctx.parsed.toLocaleString('es-CL')}}}}
  });
}

// ── TAB: POR BODEGA ───────────────────────────────────────────
function renderBodega(){
  const byBod={};
  rawActual.forEach(r=>{
    const k=r['Nombre Bodega'];
    if(!byBod[k]) byBod[k]={val:0,uni:0,clases:{}};
    byBod[k].val+=num(r.Valorizado_FI);
    byBod[k].uni+=num(r['Stock Actual']);
    const c=r.CLASIFICACION;
    byBod[k].clases[c]=(byBod[k].clases[c]||0)+num(r.Valorizado_FI);
  });
  const bods=Object.entries(byBod).sort((a,b)=>b[1].val-a[1].val);
  const clases=[...new Set(rawActual.map(r=>r.CLASIFICACION))].sort();

  const thC=clases.map(c=>`<th><span class="cdot" style="background:${clasColor(c)}"></span>${c}</th>`).join('');
  const rows=bods.map(([b,d])=>{
    const celdas=clases.map(c=>`<td>${d.clases[c]?fmtM(d.clases[c]):'—'}</td>`).join('');
    return `<tr><td><b>${b}</b></td>${celdas}<td style="font-weight:600">${fmtM(d.val)}</td><td>${fmtN(d.uni)}</td></tr>`;
  }).join('');

  const barLabels=bods.slice(0,12).map(([b])=>b.length>20?b.slice(0,18)+'…':b);
  const barData  =bods.slice(0,12).map(([,d])=>Math.round(d.val/1e6*10)/10);
  const barColors=bods.slice(0,12).map(([,d])=>{
    const maxC=Object.entries(d.clases).sort((a,b)=>b[1]-a[1])[0];
    return maxC?clasColor(maxC[0])+'99':'#7a7f9499';
  });

  document.getElementById('mc').innerHTML=`
    <div class="card" style="margin-top:4px">
      <div class="ch"><div><div class="ct">Valor por bodega (top 12)</div><div class="cs">Millones CLP · color = clasificación dominante</div></div></div>
      <div class="cw" style="height:280px"><canvas id="cBod"></canvas></div>
    </div>
    <div class="tbl" style="overflow-x:auto">
      <table><thead><tr><th>Bodega</th>${thC}<th>Total</th><th>Unidades</th></tr></thead>
      <tbody>${rows}</tbody></table>
    </div>`;

  killChart();
  chartInst=new Chart(document.getElementById('cBod'),{
    type:'bar',
    data:{labels:barLabels,datasets:[{label:'Valor M$',data:barData,backgroundColor:barColors,borderRadius:4,barPercentage:.6}]},
    options:{...cOpts('M$'),plugins:{...cOpts('M$').plugins}}
  });
}

// ── TAB: BÚSQUEDA PRODUCTOS ───────────────────────────────────
function renderProductos(){
  const clases=[...new Set(rawActual.map(r=>r.CLASIFICACION))].sort();
  if(!selClas && clases.length) selClas=clases[0];

  const catBtns=clases.map(c=>
    `<button class="cat-btn${c===selClas?' on':''}"
      style="${c===selClas?'color:'+clasColor(c)+';border-color:'+clasColor(c)+';border-width:2px':''}"
      onclick="selClas='${c}';renderProductos()">${c}</button>`
  ).join('');

  const filtered=rawActual.filter(r=>r.CLASIFICACION===selClas)
    .sort((a,b)=>num(b.Valorizado_FI)-num(a.Valorizado_FI));

  const rows=filtered.map(r=>{
    const cero=num(r['Stock Actual'])===0;
    return `<tr>
      <td>${r['Nombre Producto']} ${cero?'<span class="tag-cero">SIN STOCK</span>':''}</td>
      <td style="color:var(--muted);font-size:11px">${r['Nombre Bodega']}</td>
      <td style="color:var(--muted);font-size:11px">${r['Nivel 2']}</td>
      <td class="${cero?'red':''}">${fmtN(num(r['Stock Actual']))} ${r['Uni.Med.']}</td>
      <td>${fmtM(num(r.Valorizado_FI))}</td>
    </tr>`;
  }).join('');

  document.getElementById('mc').innerHTML=`
    <div style="margin-top:4px;margin-bottom:14px">
      <div class="search-wrap">
        <input id="inp-prod" placeholder="Buscar producto..." autocomplete="off"
          oninput="filterProds(this.value)"/>
      </div>
      <div class="cat-sel">${catBtns}</div>
    </div>
    <div class="tbl" id="prod-tbl" style="overflow-x:auto">
      <table><thead><tr><th>Producto</th><th>Bodega</th><th>Nivel 2</th><th>Stock</th><th>Valorizado</th></tr></thead>
      <tbody id="prod-tbody">${rows}</tbody></table>
    </div>`;
}

function filterProds(q){
  const clases=[...new Set(rawActual.map(r=>r.CLASIFICACION))].sort();
  const filtered=rawActual.filter(r=>
    r.CLASIFICACION===selClas &&
    (!q || r['Nombre Producto'].toLowerCase().includes(q.toLowerCase()) ||
           (r['Nivel 2']||'').toLowerCase().includes(q.toLowerCase()))
  ).sort((a,b)=>num(b.Valorizado_FI)-num(a.Valorizado_FI));

  document.getElementById('prod-tbody').innerHTML=filtered.map(r=>{
    const cero=num(r['Stock Actual'])===0;
    return `<tr>
      <td>${r['Nombre Producto']} ${cero?'<span class="tag-cero">SIN STOCK</span>':''}</td>
      <td style="color:var(--muted);font-size:11px">${r['Nombre Bodega']}</td>
      <td style="color:var(--muted);font-size:11px">${r['Nivel 2']}</td>
      <td class="${cero?'red':''}">${fmtN(num(r['Stock Actual']))} ${r['Uni.Med.']}</td>
      <td>${fmtM(num(r.Valorizado_FI))}</td>
    </tr>`;
  }).join('');
}

// ── TAB: EVOLUCIÓN HISTÓRICA ──────────────────────────────────
function renderHistorico(){
  if(!rawHist.length){
    document.getElementById('mc').innerHTML=`
      <div class="state-box"><span>Sin datos históricos aún.</span>
      <span style="font-size:12px">Ejecutar py emsa_sync_stock.py --once al menos una vez por día.</span></div>`;
    return;
  }

  const clases=[...new Set(rawHist.map(r=>r.CLASIFICACION))].sort();
  if(!selClas && clases.length) selClas=clases[0];

  const catBtns=clases.map(c=>
    `<button class="cat-btn${c===selClas?' on':''}"
      style="${c===selClas?'color:'+clasColor(c)+';border-color:'+clasColor(c)+';border-width:2px':''}"
      onclick="selClas='${c}';renderHistorico()">${c}</button>`
  ).join('');

  // Agrupar por fecha para la clasificación seleccionada
  const byFecha={};
  rawHist.filter(r=>r.CLASIFICACION===selClas).forEach(r=>{
    const f=r.FECHA;
    if(!byFecha[f]) byFecha[f]={val:0,uni:0};
    byFecha[f].val+=num(r.Valorizado_FI);
    byFecha[f].uni+=num(r['Stock Actual']);
  });

  const fechas=Object.keys(byFecha).sort();
  const valData=fechas.map(f=>Math.round(byFecha[f].val/1e6*10)/10);
  const uniData=fechas.map(f=>Math.round(byFecha[f].uni));

  const lastFecha=fechas[fechas.length-1];
  const lastVal=byFecha[lastFecha]?.val||0;
  const lastUni=byFecha[lastFecha]?.uni||0;
  const prevVal=fechas.length>1?byFecha[fechas[fechas.length-2]]?.val||0:0;
  const dVal=prevVal>0?((lastVal-prevVal)/prevVal*100):null;

  document.getElementById('mc').innerHTML=`
    <div class="cat-sel" style="margin-top:4px">${catBtns}</div>
    <div class="kpis" style="grid-template-columns:repeat(3,minmax(0,1fr));margin-bottom:18px">
      <div class="kpi"><div class="kpi-l">Valor actual</div><div class="kpi-v">${fmtM(lastVal)}</div>
        <div class="kpi-s" style="color:${dVal!==null&&dVal>=0?'var(--grn)':'var(--red)'}">${dVal!==null?(dVal>=0?'+':'')+dVal.toFixed(1)+'% vs día anterior':'Sin comparativo'}</div></div>
      <div class="kpi"><div class="kpi-l">Unidades actuales</div><div class="kpi-v">${fmtN(lastUni)}</div><div class="kpi-s">${lastFecha}</div></div>
      <div class="kpi"><div class="kpi-l">Días de historial</div><div class="kpi-v">${fechas.length}</div><div class="kpi-s">desde ${fechas[0]||'—'}</div></div>
    </div>
    <div class="card">
      <div class="ch">
        <div><div class="ct">Evolución del valor de stock — ${selClas}</div><div class="cs">Millones CLP · snapshot diario</div></div>
        <div class="leg">
          <span class="li"><span class="ll" style="background:${clasColor(selClas)}"></span>Valorizado M$</span>
        </div>
      </div>
      <div class="cw" style="height:260px"><canvas id="cHist"></canvas></div>
    </div>
    <div class="card" style="margin-bottom:0">
      <div class="ch"><div><div class="ct">Evolución en unidades</div><div class="cs">Stock físico · snapshot diario</div></div></div>
      <div class="cw" style="height:220px"><canvas id="cHistU"></canvas></div>
    </div>`;

  killChart();
  const color=clasColor(selClas);
  chartInst=new Chart(document.getElementById('cHist'),{
    type:'line',
    data:{labels:fechas,datasets:[{label:'Valor M$',data:valData,
      borderColor:color,backgroundColor:color+'15',borderWidth:2.5,
      pointRadius:4,pointHoverRadius:7,pointBackgroundColor:color,tension:.35,fill:true}]},
    options:cOpts('M$')
  });
  new Chart(document.getElementById('cHistU'),{
    type:'line',
    data:{labels:fechas,datasets:[{label:'Unidades',data:uniData,
      borderColor:color+'aa',backgroundColor:color+'0a',borderWidth:2,
      pointRadius:3,pointHoverRadius:6,pointBackgroundColor:color+'aa',tension:.35,fill:true}]},
    options:cOpts('un')
  });
}

// ── INIT ──────────────────────────────────────────────────────
(async()=>{
  try{
    [rawActual] = await Promise.all([fetchSheet('stock_actual')]);
    try{ rawHist = await fetchSheet('stock_historico'); }catch(e){ rawHist=[]; }

    const meta = await (async()=>{
      try{
        const r=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/meta!A1?key=${API_KEY}`);
        const d=await r.json(); return d.values?.[0]?.[0]||'';
      }catch(e){return '';}
    })();

    const totVal=rawActual.reduce((s,r)=>s+num(r.Valorizado_FI),0);
    document.getElementById('last-sync').textContent=
      '$'+Math.round(totVal/1e6).toLocaleString('es-CL')+'M'+(meta?' · '+meta:'');

    render();
  }catch(e){
    document.getElementById('mc').innerHTML=`
      <div class="state-box">
        <span style="color:#c94a4a">Error al cargar datos</span>
        <span style="font-size:12px">${e.message}</span>
        <span style="font-size:11px;color:#7a7f94">Verificar que el Sheet es público y tiene datos</span>
      </div>`;
  }
})();
</script>
